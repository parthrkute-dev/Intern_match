<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | Intern Match</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);font-family:Arial,Helvetica,sans-serif;overflow:hidden;}
.glow{position:absolute;width:320px;height:320px;border-radius:50%;filter:blur(120px);opacity:.35;animation:float 8s ease-in-out infinite;}
.one{background:#3b82f6;left:8%;bottom:8%;}
.two{background:#8b5cf6;right:10%;top:8%;animation-delay:2s;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-28px)}}
.card-ui{width:390px;max-width:92%;padding:34px;border:none;border-radius:26px;background:rgba(255,255,255,.12);backdrop-filter:blur(18px);box-shadow:0 24px 50px rgba(0,0,0,.28);color:#fff;position:relative;z-index:2;}
.title{font-size:1.9rem;font-weight:700;text-align:center;margin-bottom:8px;}
.sub{font-size:.95rem;color:#dbeafe;text-align:center;margin-bottom:24px;}
.form-control{height:54px;border:none;border-radius:14px;background:rgba(255,255,255,.16);color:#fff;padding:0 16px;margin-bottom:14px;}
.form-control::placeholder{color:#dbeafe;}
.form-control:focus{background:rgba(255,255,255,.2);color:#fff;box-shadow:none;}
.btn-main{height:54px;border:none;border-radius:14px;font-weight:700;background:linear-gradient(90deg,#2563eb,#7c3aed);transition:.25s ease;}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 12px 24px rgba(59,130,246,.35);}
.note{font-size:.85rem;text-align:center;color:#cbd5e1;margin-top:14px;}
</style>
</head>
<body>
<div class="glow one"></div>
<div class="glow two"></div>
<div class="card-ui">
<div class="title">Intern Match</div>
<div class="sub">Admin Control Panel</div>
<input type="text" id="user" class="form-control" placeholder="Admin Username">
<input type="password" id="pass" class="form-control" placeholder="Password">
<button onclick="handleLogin()" class="btn btn-main text-white w-100">Login</button>
<div class="note">Secure access for administrators</div>
</div>
<script>
async function handleLogin(){
const res=await fetch('/login',{
method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({username:document.getElementById('user').value,password:document.getElementById('pass').value})
});
if(res.ok) window.location.href='/choice';
else alert('Wrong credentials');
}
</script>
</body>
</html>
