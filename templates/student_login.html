<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Access | Intern Match</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1d4ed8,#7c3aed);
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
}

.glow{
    position:absolute;
    width:320px;
    height:320px;
    border-radius:50%;
    filter:blur(120px);
    opacity:.35;
    animation:float 8s ease-in-out infinite;
}

.glow.one{
    background:#60a5fa;
    left:8%;
    bottom:8%;
}

.glow.two{
    background:#c084fc;
    right:10%;
    top:10%;
    animation-delay:2s;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-28px);}
}

.login-card{
    width:390px;
    max-width:92%;
    padding:34px;
    border:none;
    border-radius:26px;
    background:rgba(255,255,255,.14);
    backdrop-filter:blur(18px);
    box-shadow:0 24px 50px rgba(0,0,0,.28);
    color:white;
    z-index:2;
}

.title{
    font-size:30px;
    font-weight:700;
    text-align:center;
    margin-bottom:8px;
}

.sub{
    font-size:14px;
    text-align:center;
    color:#dbeafe;
    margin-bottom:24px;
}

.form-control{
    height:54px;
    border:none;
    border-radius:14px;
    background:rgba(255,255,255,.16);
    color:white;
    padding:0 16px;
}

.form-control::placeholder{
    color:#dbeafe;
}

.form-control:focus{
    background:rgba(255,255,255,.2);
    color:white;
    box-shadow:none;
}

.btn-main{
    height:54px;
    border:none;
    border-radius:14px;
    font-weight:700;
    background:linear-gradient(90deg,#3b82f6,#8b5cf6);
    transition:.25s ease;
}

.btn-main:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 24px rgba(59,130,246,.35);
}

.note{
    font-size:13px;
    text-align:center;
    color:#cbd5e1;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="glow one"></div>
<div class="glow two"></div>

<div class="login-card">
    <div class="title">Student Login</div>
    <div class="sub">Enter your email to access internship matches</div>

    <input type="email" id="email" class="form-control mb-3" placeholder="email@university.edu">

    <button onclick="auth()" class="btn btn-main text-white w-100">
        Access Dashboard
    </button>

    <div class="note">
        Your next internship could be one click away.
    </div>
</div>

<script>
async function auth() {
    const email = document.getElementById('email').value;

    if(!email){
        return alert("Email is required!");
    }

    const res = await fetch('/api/auth', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            email:email,
            type:'student'
        })
    });

    if(res.ok){
        window.location.href='/dashboard';
    }else{
        alert("Unable to login right now.");
    }
}
</script>

</body>
</html>
