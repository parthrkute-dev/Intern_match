<!DOCTYPE html>
<html>
<head>
    <title>Company Access | Intern Match</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="card p-4 shadow-sm mx-auto" style="width: 350px; border-radius: 15px;">
        <h4 class="fw-bold text-center mb-3">Company Login</h4>
        <label class="small text-muted mb-2">Enter corporate email</label>
        <input type="email" id="email" class="form-control mb-3" placeholder="hr@company.com">
        <button onclick="auth()" class="btn btn-dark w-100">Access Portal</button>
    </div>
    <script>
        async function auth() {
            const email = document.getElementById('email').value;
            if(!email) return alert("Email is required!");
            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: email, type: 'company'})
            });
            if(res.ok) window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
